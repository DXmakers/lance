version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: lance-postgres
    environment:
      POSTGRES_USER: lance
      POSTGRES_PASSWORD: lance
      POSTGRES_DB: lance
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lance -d lance"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lance-network
    restart: unless-stopped

  # Backend API Service (Rust/Axum)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: lance-backend
    environment:
      APP_ENV: development
      DATABASE_URL: postgres://lance:lance@postgres:5432/lance
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-TODO_fill_in}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-https://api.openclaw.ai/v1}
      STELLAR_RPC_URL: ${STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      STELLAR_NETWORK_PASSPHRASE: ${STELLAR_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}
      JUDGE_AUTHORITY_SECRET: ${JUDGE_AUTHORITY_SECRET:-TODO_fill_in_soroban_key}
      ESCROW_CONTRACT_ID: ${ESCROW_CONTRACT_ID:-TODO_after_deploy}
      REPUTATION_CONTRACT_ID: ${REPUTATION_CONTRACT_ID:-TODO_after_deploy}
      JOB_REGISTRY_CONTRACT_ID: ${JOB_REGISTRY_CONTRACT_ID:-TODO_after_deploy}
      PORT: 3001
      RUST_LOG: ${RUST_LOG:-backend=debug,tower_http=debug}
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app/backend:cached
      - backend_target:/app/target
      - cargo_registry:/usr/local/cargo/registry
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - lance-network
    restart: unless-stopped

  # Frontend Web Application (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: lance-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_STELLAR_NETWORK: ${NEXT_PUBLIC_STELLAR_NETWORK:-testnet}
      NEXT_PUBLIC_STELLAR_RPC_URL: ${NEXT_PUBLIC_STELLAR_RPC_URL:-https://soroban-testnet.stellar.org}
      NEXT_PUBLIC_ESCROW_CONTRACT_ID: ${ESCROW_CONTRACT_ID:-TODO_after_deploy}
      NEXT_PUBLIC_REPUTATION_CONTRACT_ID: ${REPUTATION_CONTRACT_ID:-TODO_after_deploy}
      NEXT_PUBLIC_JOB_REGISTRY_CONTRACT_ID: ${JOB_REGISTRY_CONTRACT_ID:-TODO_after_deploy}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web:cached
      - ./package.json:/app/package.json:ro
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - lance-network
    restart: unless-stopped

  # pgAdmin - PostgreSQL Administration Tool (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lance-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lance.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - lance-network
    restart: unless-stopped
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  backend_target:
    driver: local
  cargo_registry:
    driver: local
  web_node_modules:
    driver: local
  web_app_node_modules:
    driver: local
  web_next:
    driver: local

networks:
  lance-network:
    driver: bridge
